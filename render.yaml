services:
  - type: web
    name: calorie-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python mysite/manage.py collectstatic --noinput
    startCommand: gunicorn --chdir mysite mysite.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
