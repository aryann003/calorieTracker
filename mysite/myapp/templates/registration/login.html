{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'myapp/css/main.css' %}" />
  </head>
  <body>
    <div class="background-blur"></div>
    <main class="page-wrapper container py-5">
      <div class="card glass p-4">
        <h3 class="mb-3">Welcome back</h3>
        <form method="post">
          {% csrf_token %}
          {% if form.errors %}
            <div class="alert alert-danger">Invalid username or password.</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password }}
          </div>
          <div class="d-flex gap-2">
            <a href="{% url 'home' %}" class="btn btn-outline-secondary">Back</a>
            <button type="submit" class="btn btn-dark">Log in</button>
          </div>
        </form>
        <p class="mt-3 text-muted">New here? <a href="{% url 'register' %}">Create an account</a>.</p>
      </div>
    </main>
  </body>
</html>
