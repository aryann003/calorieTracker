{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Account</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'myapp/css/main.css' %}" />
  </head>
  <body>
    <div class="background-blur"></div>
    <main class="page-wrapper container py-5">
      <div class="card glass p-4">
        <h3 class="mb-3">Create your account</h3>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small">{{ field.errors|striptags }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <div class="d-flex gap-2">
            <a href="{% url 'home' %}" class="btn btn-outline-secondary">Back</a>
            <button type="submit" class="btn btn-dark">Sign up</button>
          </div>
        </form>
        <p class="mt-3 text-muted">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
      </div>
    </main>
  </body>
</html>
